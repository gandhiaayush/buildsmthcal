<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatter — Join Call</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 8px; }
    #status { font-size: 0.9rem; color: #888; margin-bottom: 32px; min-height: 20px; }
    #join-btn {
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: none;
    }
    #join-btn:hover { background: #1d4ed8; }
    #participants {
      margin-top: 32px;
      width: 100%;
      max-width: 320px;
    }
    .participant {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: #1a1a1a;
      border-radius: 10px;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
    .dot.muted { background: #555; }
    #error { color: #f87171; font-size: 0.85rem; margin-top: 16px; text-align: center; }
  </style>
</head>
<body>
  <h1>Chatter</h1>
  <div id="status">Connecting…</div>
  <button id="join-btn" onclick="startAudio()">Tap to enable audio</button>
  <div id="participants"></div>
  <div id="error"></div>

  <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const roomName = params.get('room');
    const token    = params.get('token');
    const lkUrl    = params.get('lkUrl');

    const statusEl  = document.getElementById('status');
    const joinBtn   = document.getElementById('join-btn');
    const partEl    = document.getElementById('participants');
    const errorEl   = document.getElementById('error');

    const { Room, RoomEvent, Track } = LivekitClient;
    let room;

    if (!roomName || !token || !lkUrl) {
      statusEl.textContent = 'Missing room / token / server URL in link.';
    } else {
      connect();
    }

    async function connect() {
      room = new Room({ webAudioMix: false }); // webAudioMix: false avoids autoplay issues

      room.on(RoomEvent.AudioPlaybackStatusChanged, () => {
        if (!room.canPlaybackAudio) {
          joinBtn.style.display = 'block';
        } else {
          joinBtn.style.display = 'none';
        }
      });

      room.on(RoomEvent.Connected, () => {
        statusEl.textContent = `In call — room: ${roomName}`;
        renderParticipants();
      });

      room.on(RoomEvent.Disconnected, () => {
        statusEl.textContent = 'Disconnected.';
        renderParticipants();
      });

      room.on(RoomEvent.ParticipantConnected, renderParticipants);
      room.on(RoomEvent.ParticipantDisconnected, renderParticipants);
      room.on(RoomEvent.TrackSubscribed, (_track, _pub, _participant) => renderParticipants());
      room.on(RoomEvent.TrackUnsubscribed, renderParticipants);

      try {
        await room.connect(lkUrl, token);
        await room.localParticipant.setMicrophoneEnabled(true);
      } catch (err) {
        statusEl.textContent = 'Connection failed.';
        errorEl.textContent = err.message;
        console.error(err);
      }
    }

    function startAudio() {
      room?.startAudio();
      joinBtn.style.display = 'none';
    }

    function renderParticipants() {
      const all = [];

      // Local
      if (room?.localParticipant) {
        const lp = room.localParticipant;
        all.push({ identity: lp.identity || 'You', muted: !lp.isMicrophoneEnabled });
      }

      // Remote
      if (room?.remoteParticipants) {
        room.remoteParticipants.forEach((p) => {
          all.push({ identity: p.identity, muted: false });
        });
      }

      partEl.innerHTML = all.map(p => `
        <div class="participant">
          <div class="dot ${p.muted ? 'muted' : ''}"></div>
          <span>${p.identity}</span>
          ${p.muted ? '<span style="color:#555;font-size:0.75rem">muted</span>' : ''}
        </div>
      `).join('');
    }
  </script>
</body>
</html>
